name: 'Changelog Updater Action'
description: 'Fast changelog updates using pre-compiled Go binaries'

author: Shane Froebel <sfroebel@therabbithole.com>

inputs:
  tag:
    required: true
    description: Semantic version number of the latest release. The value will be used as a heading text and to replace that section.
  notes:
    required: true
    description: The release notes you want to add to your CHANGELOG.
  path:
    required: false
    description: The path to the CHANGELOG.md file relative to the repo root.
    default: .
  date:
    required: false
    description: The date the latest version has been released. Defaults to the current date.
  diff:
    required: false
    description: Show the diff during the action for debugging purposes.
    default: "false"
  dry:
    required: false
    description: Doesn't make any changes to the changelog.
    default: "false"
  verbose:
    required: false
    description: Debug turn on.
    default: "false"

runs:
  using: 'docker'
  image: '../../Dockerfile'
  args:
    - --tag="${{ inputs.tag }}"
    - --notes="${{ inputs.notes }}"
    - --path="${{ inputs.path }}"
    - --date="${{ inputs.date }}"
    - --diff=${{ inputs.diff }}
    - --dry=${{ inputs.dry }}
    - --verbose=${{ inputs.verbose }}
