name: Release Manager

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
  release:
    types: [published]

permissions:
  contents: write
  pull-requests: write
  packages: write
  id-token: write

jobs:
  Update_On_Main:
    name: 🚀 Update Changelog & Prep Release
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3.1.1
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: 📂 Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: 📝 Release Drafter (Anticipate Version)
        id: drafter
        uses: release-drafter/release-drafter@v6
        with:
          prerelease: false
          latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Release Version
        run: |
          task update-version NEW_VERSION=v${{ steps.drafter.outputs.resolved_version }}

      # This is because we are local to ourselves -- do not copy this into your workflow! Review the examples!
      - name: 📤 Build and Run CHANGELOG.md
        env:
          # Use Environment Variables to safely store the multi-line string
          RELEASE_NOTES: ${{ steps.drafter.outputs.body }}
          RELEASE_VERSION: v${{ steps.drafter.outputs.resolved_version }}
        run: |
          go build -o bin/changelog-updater-action ./cmd/action
          chmod +x bin/changelog-updater-action
          LOG_FORMAT=text ./bin/changelog-updater-action \
            -t "$RELEASE_VERSION" \
            -notes "$RELEASE_NOTES" \
            --diff

      - name: 📤 Commit and Push Version Update
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "chore(pre-release): v${{ steps.drafter.outputs.resolved_version }} [skip ci]"

  Build_and_Release:  # Note: I know there are actions that can do this for me.
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Build Binary
        run: task build GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }}

      - name: Upload Binary to Release
        uses: softprops/action-gh-release@v2
        with:
          files: bin/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
