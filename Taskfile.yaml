version: '3'
vars:
  ARTIFACT_NAME: changelog-updater-action
  VERSION: "v0.3.2"
  GITSHA:
    sh: git rev-parse --short HEAD 2>/dev/null || echo "unknown"
  GOOS:
    sh: go env GOOS
  GOARCH:
    sh: go env GOARCH
  COMMON_LIC: "2026 Shane & Contributors"
tasks:
  default:
    cmds:
      - task: build
  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin/
  build:
    desc: Build the binary
    sources:
      - ./cmd/action/**/*.go
      - ./internal/**/*.go
    generates:
      - bin/{{.ARTIFACT_NAME}}-{{.GOOS}}-{{.GOARCH}}
    cmds:
      - |
        CGO_ENABLED=0 GOOS={{.GOOS}} GOARCH={{.GOARCH}} go build \
        -o bin/{{.ARTIFACT_NAME}}-{{.GOOS}}-{{.GOARCH}} \
        -ldflags "-X 'main.Version={{.VERSION}}' -X 'main.Gitsha={{.GITSHA}}'" \
        ./cmd/action
      - chmod +x bin/{{.ARTIFACT_NAME}}-{{.GOOS}}-{{.GOARCH}}
  test:
    desc: Run tests
    cmds:
      - go test -v -tags=all -parallel 4 -timeout 2h ./...
  lint-init:
    desc: Install linting tools via Brew
    cmds:
      - brew install golangci-lint gitleaks yamllint
      - go install golang.org/x/tools/cmd/goimports@latest
  lint:
    desc: Run all linters and formatters
    deps: [license]
    cmds:
      - goimports -w ./
      - golangci-lint run
      - yamllint .
      - gitleaks detect . --no-git --verbose --config=.gitleaks.toml
  golic-install:
    desc: Install GoLic
    cmd: go install github.com/Bugs5382/golic/cmd/golic@v0.2.0
  license:
    desc: Dry run for license injection
    deps: [golic-install]
    cmds:
      - golic inject -c "{{.COMMON_LIC}}" -t isc
  license-dry:
    desc: Dry run for license injection
    deps: [golic-install]
    cmds:
      - golic inject -c "{{.COMMON_LIC}}" -t isc -d
  license-remove:
    desc: Dry run for license remove
    deps: [golic-install]
    cmds:
      - golic remove -c "{{.COMMON_LIC}}" -t isc
  license-remove-dry:
    desc: Dry run for license remove
    deps: [golic-install]
    cmds:
      - golic remove -c "{{.COMMON_LIC}}" -t isc -d
  update-version:
    desc: Updates the version variable in Taskfile.yml
    vars:
      NEW_VERSION: '{{.NEW_VERSION | default .VERSION_ENV | default "local"}}'
    preconditions:
      - sh: command -v yq
        msg: "yq is not installed. Install it via 'brew install yq' or the GitHub Action."
    cmds:
      - yq -i '.vars.VERSION = "{{.NEW_VERSION}}"' "{{.TASKFILE_DIR}}/Taskfile.yaml"
